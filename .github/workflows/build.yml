name: Build Reusable SANA-WM Job Worker

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sana-wm-job-worker-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get files
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          BASE_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "worker=$BASE_IMAGE:job-worker-1" >> "$GITHUB_OUTPUT"
          echo "Using image: $BASE_IMAGE:job-worker-1"

      - name: Set up Docker builder
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub container storage
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish reusable worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.worker }}
          provenance: false
