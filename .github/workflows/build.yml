name: Build Sana WM Salad Image

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get files
        uses: actions/checkout@v4

      - name: Set image names
        id: image
        run: |
          BASE_IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "latest=$BASE_IMAGE:latest" >> "$GITHUB_OUTPUT"
          echo "tosfix=$BASE_IMAGE:tosfix1" >> "$GITHUB_OUTPUT"
          echo "Using image: $BASE_IMAGE"

      - name: Set up builder
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub container storage
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.latest }}
            ${{ steps.image.outputs.tosfix }}
          provenance: false
